workflows:
  ios-release:
    name: VModa iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - app_store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vmoda.app
      node: 22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          node --version
          npm --version
          npm ci

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Resolve Swift Packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Set up Xcode signing
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj
          echo "Effective signing build settings:"
          xcodebuild -project ios/App/App.xcodeproj -scheme App -showBuildSettings \
            | grep -E "DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_ENTITLEMENTS" || true

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Verify IPA contents
        script: |
          set -e
          IPA_PATH="$(find build/ios/ipa -name "*.ipa" -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found after build."
            exit 1
          fi

          rm -rf /tmp/vmoda_ipa_check
          mkdir -p /tmp/vmoda_ipa_check
          unzip -q "$IPA_PATH" -d /tmp/vmoda_ipa_check
          APP_PATH="$(find /tmp/vmoda_ipa_check/Payload -maxdepth 2 -name "*.app" -type d -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found inside IPA."
            exit 1
          fi

          echo "Built app bundle: $APP_PATH"
          echo "Bundle version:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/Info.plist"

          if [ ! -f "$APP_PATH/GoogleService-Info.plist" ]; then
            echo "GoogleService-Info.plist is missing from the final .app bundle."
            exit 1
          fi

          FIREBASE_BUNDLE_ID="$(/usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" "$APP_PATH/GoogleService-Info.plist")"
          if [ "$FIREBASE_BUNDLE_ID" != "com.vmoda.app" ]; then
            echo "GoogleService-Info.plist BUNDLE_ID is '$FIREBASE_BUNDLE_ID', expected 'com.vmoda.app'."
            exit 1
          fi

          echo "IPA verification passed: GoogleService-Info.plist is bundled and matches com.vmoda.app."

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive/dSYMs/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
