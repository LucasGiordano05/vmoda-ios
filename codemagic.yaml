workflows:
  ios-release:
    name: VModa iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vmoda.app
      node: 22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          node --version
          npm --version
          npm ci

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Resolve Swift Packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Set up Xcode signing
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj
          echo "Effective signing build settings:"
          xcodebuild -project ios/App/App.xcodeproj -scheme App -showBuildSettings \
            | grep -E "DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_ENTITLEMENTS" || true

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
