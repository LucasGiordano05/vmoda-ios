workflows:
  ios-release:
    name: VModa iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store
      node: 22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          node --version
          npm --version
          npm ci

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Resolve Swift Packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Validate Apple signing environment
        script: |
          set -e
          : "${APP_STORE_CONNECT_ISSUER_ID:?Missing APP_STORE_CONNECT_ISSUER_ID}"
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?Missing APP_STORE_CONNECT_KEY_IDENTIFIER}"
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?Missing APP_STORE_CONNECT_PRIVATE_KEY}"
          : "${CERTIFICATE_PRIVATE_KEY:?Missing CERTIFICATE_PRIVATE_KEY}"

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.vmoda.app \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates

          PROFILE_PATH=""
          for candidate in "$HOME"/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            [ -f "$candidate" ] || continue
            security cms -D -i "$candidate" > /tmp/vmoda_candidate_profile.plist
            APP_IDENTIFIER="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/vmoda_candidate_profile.plist 2>/dev/null || true)"
            if echo "$APP_IDENTIFIER" | grep -q "com.vmoda.app$"; then
              PROFILE_PATH="$candidate"
              cp /tmp/vmoda_candidate_profile.plist /tmp/vmoda_profile.plist
              break
            fi
          done

          if [ -z "$PROFILE_PATH" ]; then
            echo "No provisioning profile for com.vmoda.app was downloaded."
            echo "Downloaded profiles:"
            find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" -print || true
            exit 1
          fi

          echo "Provisioning profile entitlements:"
          /usr/libexec/PlistBuddy -c "Print :Entitlements" /tmp/vmoda_profile.plist || true
          if ! /usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" /tmp/vmoda_profile.plist >/dev/null 2>&1; then
            echo "The App Store provisioning profile does not include Push Notifications (aps-environment)."
            echo "Enable Push Notifications for bundle id com.vmoda.app in Apple Developer, delete/regenerate the App Store profile, then rerun this build."
            exit 1
          fi

          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/vmoda_profile.plist)"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/vmoda_profile.plist)"
          APS_ENVIRONMENT="$(/usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" /tmp/vmoda_profile.plist)"
          echo "Using provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "aps-environment: $APS_ENVIRONMENT"
          echo "VMODA_PROFILE_SPECIFIER=$PROFILE_NAME" >> "$CM_ENV"

          xcode-project use-profiles \
            --project ios/App/App.xcodeproj \
            --profile "$PROFILE_PATH"

          echo "Effective signing build settings:"
          xcodebuild -project ios/App/App.xcodeproj -scheme App -showBuildSettings \
            | grep -E "DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_ENTITLEMENTS" || true

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS' DEVELOPMENT_TEAM=TVJP5Y38FA CODE_SIGN_IDENTITY='Apple Distribution' PROVISIONING_PROFILE_SPECIFIER='$VMODA_PROFILE_SPECIFIER'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
